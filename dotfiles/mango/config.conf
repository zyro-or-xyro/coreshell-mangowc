# === autostart ===
exec-once=swaync
exec-once=swww-daemon
exec-once=waybar
exec-once=waybar -c .config/waybar/configbottom.jsonc -s .config/waybar/stylebottom.css
exec-once=xwayland-satellite

# === appearance / gaps ===
borderpx=1
# Example shadows configuration
shadows=1
layer_shadows=1
shadow_only_floating=0
shadows_size=4
shadows_blur=16
shadows_position_x=0
shadows_position_y=0
shadowscolor=0x000000be

rootcolor=0x201b14ff
bordercolor=0x0e0e0eff
focuscolor=0xebebebff
no_border_when_single=0
gappih=8
gappiv=8
gappoh=8
gappov=8
scratchpad_width_ratio=0.8
scratchpad_height_ratio=0.9

# === reload ===
bind=super+shift,r,reload_config

# === keyboard options ===
repeat_rate=25
repeat_delay=600
xkb_rules_layout=us

# === general options ===
focus_on_activate=1
sloppyfocus=1
warpcursor=1
snap_distance=30
drag_tile_to_tile=1

# overview stuff
overviewgappo=64
enable_hotarea=0

# === key bindings ===
# apps
bind=super,t,spawn,kitty
bind=super,q,spawn,firefox
bind=alt,space,spawn,wofi --show drun --prompt "Find..."
bind=super,x,spawn,wofi-emoji
bind=super,l,spawn,hyprlock
bind=super,e,spawn,nautilus
bind=super,escape,spawn,nwg-bar
bind=super,n,spawn,swaync-client -t
bind=super,z,spawn,waypaper
bind=super+shift,s,spawn,flameshot gui

# window controls
bind=super,w,killclient,
bind=super+shift,f,togglefullscreen,
bind=super,v,togglefloating,
bind=super,o,toggleoverview,

# focus movement
bind=super,Left,focusdir,left
bind=super,Right,focusdir,right
bind=super,Up,focusdir,up
bind=super,Down,focusdir,down

# move/resize windows
bind=CTRL+SHIFT,Left,movewin,-50,+0
bind=CTRL+SHIFT,Right,movewin,+50,+0
bind=CTRL+SHIFT,Up,movewin,+0,-50
bind=CTRL+SHIFT,Down,movewin,+0,+50

bind=CTRL+super,Left,resizewin,-50,+0
bind=CTRL+super,Right,resizewin,+50,+0
bind=CTRL+super,Up,resizewin,+0,-50
bind=CTRL+super,Down,resizewin,+0,+50

# workspace / tags
bind=super+shift,1,tag,1
bind=super+shift,2,tag,2
bind=super+shift,3,tag,3
bind=super+shift,4,tag,4
bind=super+shift,5,tag,5
bind=super+shift,6,tag,6
bind=super+shift,7,tag,7
bind=super+shift,8,tag,8
bind=super+shift,9,tag,9

bind=super,1,view,1
bind=super,2,view,2
bind=super,3,view,3
bind=super,4,view,4
bind=super,5,view,5
bind=super,6,view,6
bind=super,7,view,7
bind=super,8,view,8
bind=super,9,view,9

# workspace switching across monitors
bind=super+shift,Left,focusmon,left
bind=super+shift,Right,focusmon,right
bind=alt+super,Left,tagmon,left
bind=alt+super,Right,tagmon,right

# swap windows (like move container in sway)
bind=super+SHIFT,Left,exchange_client,left
bind=super+SHIFT,Right,exchange_client,right
bind=super+SHIFT,Up,exchange_client,up
bind=super+SHIFT,Down,exchange_client,down

# layer animations
animations=1
layer_animations=1
animation_type_open=slide
animation_type_close=slide
tag_animation_direction=1
animation_duration_move=300
animation_duration_open=300
animation_duration_tag=300
animation_duration_close=300
animation_duration_focus=0

# === mouse ===
mousebind=super,btn_left,moveresize,curmove
mousebind=NONE,btn_middle,togglemaximizescreen,0
mousebind=super,btn_right,moveresize,curresize
